<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- CSP is injected from .env.production at build time; empty (inactive) during development so hot-reload keeps working -->
    <meta http-equiv="Content-Security-Policy" content="%REACT_APP_CSP%" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#041023" />
    <meta name="description" content="Ossolut is an independent design and technology studio: digital products, custom automation, security testing and brand systems built by one integrated senior team." />
    <meta property="og:title" content="Ossolut — Design & Technology Studio" />
    <meta property="og:description" content="Digital products, custom automation, security testing and brand systems built by one integrated senior team." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gashierin.github.io/ossolut/" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="canonical" href="https://gashierin.github.io/ossolut/" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Ossolut — Design & Technology Studio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Ossolut AI assistant — served by the ossolut-chatbot server -->
    <script src="%REACT_APP_CHATBOT_URL%/widget.js" defer
            data-endpoint="%REACT_APP_CHATBOT_URL%/api/chat"
            data-name="Ossolut Assistant"
            data-color="#0b1730"
            data-greeting="Hi! I'm the Ossolut assistant. Tell me about the problem you're trying to solve and I'll show you how we can fix it."></script>
  </body>
</html>
